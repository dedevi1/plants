<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pflanzen Controller</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <!-- STATUS -->
    <div class="status-bar">
        <div id="redLed" class="led red off"></div>
        <div id="greenLed" class="led green off"></div>
    </div>

    <h1>Pflanzen Controller</h1>

    <!-- ZIMMERKARTE -->
    <section>
        <h2>Zimmerkarte</h2>
        <div id="roomContainer"></div>
    </section>

    <!-- PFLANZENLISTE -->
    <section>
        <h2>Pflanzenliste</h2>
        <input id="searchInput" placeholder="Suchen..." oninput="renderPlants()">
        <div id="filterBar">
            <button onclick="setFilter('all')">Alle</button>
            <button onclick="setFilter('red')">Rot</button>
            <button onclick="setFilter('yellow')">Gelb</button>
            <button onclick="setFilter('green')">Grün</button>
        </div>
        <div id="plantList"></div>
    </section>

    <!-- PFLANZE HINZUFÜGEN -->
    <section>
        <h2>Pflanze hinzufügen</h2>

        <input id="plantName" placeholder="Name">

        <select id="plantInterval">
            <option value="">Intervall</option>
            <option value="1">1 Tag</option>
            <option value="2">2 Tage</option>
            <option value="3">3 Tage</option>
            <option value="7">7 Tage</option>
        </select>

        <select id="plantRoom"></select>

        <button onclick="addPlant()">Hinzufügen</button>
    </section>

    <!-- ZIMMER -->
    <section>
        <h2>Zimmer hinzufügen</h2>
        <input id="roomName" placeholder="Zimmername">
        <button onclick="addRoom()">Hinzufügen</button>
    </section>

    <section>
        <h2>Zimmer löschen</h2>
        <select id="deleteRoom"></select>
        <button onclick="deleteRoom()">Löschen</button>
    </section>

</div>

<script src="script.js"></script>

</body>
</html>
